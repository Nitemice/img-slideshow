<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>ORIS Image Slideshow</title>
    <style>
        :root {
            font-family: system-ui, -apple-system, Segoe UI, Roboto, 'Helvetica Neue', Arial;
            color-scheme: dark;

            /* Sexy Cyberpunk Palette (refined for readability) */
            --bg: #141417;
            --panel: #1d1d22;
            --border: #2e2e34;
            --text: #e6e6f0;
            --subtext: #9b9bb2;

            --accent: #b845ff;
            /* Neon purple */
            --accent-hover: #ca66ff;
            --secondary: #00e0ff;
            /* Cyan */
            --danger: #ff3b58;
            /* Pink-red for alerts */
        }

        body {
            margin: 0;
            padding: 18px;
            background: var(--bg);
            color: var(--text);
        }

        h1 {
            margin: 0 0 12px;
            font-size: 20px;
            color: var(--accent);
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .flex-break {
            width: 100%;
            height: 0;
            margin: 0;
            padding: 0;
        }

        .topbar {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 12px;
        }

        .controls-row {
            display: flex;
            flex: auto;
            flex-wrap: wrap;
            gap: 10px;
            min-width: 30%;
        }

        /* === Buttons === */
        .btn {
            background: var(--panel);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.4);
            font-weight: 500;
        }

        .btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .btn.primary {
            background: var(--accent);
            border: none;
            color: #1a001f;
            /* Deep plum text for contrast */
            box-shadow: 0 0 10px rgba(184, 69, 255, 0.5);
        }

        .btn.primary:hover {
            background: var(--accent-hover);
            box-shadow: 0 0 12px rgba(202, 102, 255, 0.6);
        }

        .btn.secondary {
            background: var(--panel);
            border: 1px solid var(--border);
            color: var(--text);
        }

        .btn.ghost {
            background: transparent;
            border: 1px solid var(--secondary);
            color: var(--secondary);
        }

        .btn.ghost:hover {
            background: var(--secondary);
            color: #000;
        }

        input[type=file] {
            display: none;
        }

        /* Slider toggle styling */
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--secondary);
            transition: .4s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background: var(--text);
            transition: .4s;
            border-radius: 50%
        }

        input:checked+.slider {
            background: var(--accent-hover);
        }

        input:checked+.slider:before {
            transform: translateX(26px);
        }

        #shuffleToggleContainer {
            display: flex;
            flex-direction: row-reverse;
            gap: 6px;
            align-items: center;
        }

        /* === Gallery === */
        #gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 12px;
        }

        .thumb {
            width: 160px;
            height: 120px;
            overflow: hidden;
            border-radius: 6px;
            background: var(--panel);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.6);
        }

        .thumb img {
            max-width: 100%;
            max-height: 100%;
            object-fit: cover;
        }

        /* === Overlay === */
        #overlay {
            position: fixed;
            inset: 0;
            display: none;
            background: rgba(12, 12, 15, 0.95);
            align-items: center;
            justify-content: center;
            z-index: 999;
            padding: 0;
            touch-action: none;
        }

        #overlay.open {
            display: flex;
        }

        #overlay:not(.show-ui) #bottomControls,
        #overlay:not(.show-ui) #durationControl,
        #overlay:not(.show-ui) #overlayCaption {
            opacity: 0;
            pointer-events: none;
        }

        #overlay.show-ui #bottomControls,
        #overlay.show-ui #durationControl,
        #overlay.show-ui #overlayCaption {
            opacity: 1;
        }

        #bottomControls,
        #durationControl,
        #overlayCaption {
            transition: opacity 0.25s ease;
        }

        #slideBox {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        #slideImg {
            max-width: 98%;
            max-height: 98%;
            border-radius: 8px;
            border: 1px solid var(--accent);
            box-shadow: 0 0 20px rgba(184, 69, 255, 0.4);
        }

        #overlayCaption {
            position: absolute;
            top: 50px;
            width: 100%;
            text-align: center;
            color: var(--secondary);
            font-size: 16px;
            font-weight: 500;
            letter-spacing: 0.5px;
            pointer-events: none;
            text-shadow: 0 0 8px rgba(0, 224, 255, 0.4);
            /* Prevent long filenames overlapping corner buttons */
            padding: 0 80px;
            box-sizing: border-box;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* === Controls === */
        #bottomControls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            align-items: center;
            background: rgba(29, 29, 34, 0.85);
            padding: 6px 10px;
            border-radius: 6px;
            border: 1px solid var(--border);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
        }

        #durationControl {
            position: absolute;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(29, 29, 34, 0.85);
            padding: 6px 10px;
            border-radius: 6px;
            border: 1px solid var(--border);
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
        }

        #fullscreenBtn,
        #closeOverlay {
            position: absolute;
            top: 10px;
            z-index: 10;
        }

        #fullscreenBtn {
            right: 10px;
        }

        #closeOverlay {
            left: 10px;
        }

        /* === Misc === */
        .meta {
            font-size: 13px;
            color: var(--subtext);
            margin-top: 6px;
        }

        @media (max-width:600px) {
            .thumb {
                width: 120px;
                height: 90px;
            }
        }

        #notice {
            color: var(--danger);
            margin-top: 6px;
            font-size: 13px;
        }

        /* === Folder Filters === */
        #folderPanel {
            display: none;
            width: 100%;
        }

        #folderToggle {
            display: none;
            cursor: pointer;
            color: var(--secondary);
            margin-bottom: 4px;
            user-select: none;
        }

        #folderFilterList {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 10px;
            margin-bottom: 10px;
        }

        #folderFilterList label {
            background: var(--panel);
            padding: 4px 8px;
            border-radius: 6px;
            cursor: pointer;
            user-select: none;
            color: var(--text);
            border: 1px solid var(--border);
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.4);
        }

        #folderFilterList label:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        #folderFilterList input[type=checkbox] {
            accent-color: var(--accent);
        }
    </style>
</head>

<body>
    <h1>ORIS Image Slideshow</h1>

    <div class="topbar">
        <fieldset class="controls-row">
            <legend>Load images</legend>
            <button class="btn primary" id="chooseBtn">Add folder</button>
            <input id="fileInput" type="file" multiple webkitdirectory directory />
            <button class="btn ghost" id="clearBtn">Clear all</button>
            <div class="flex-break"></div>
            <div class="meta" id="info">No images loaded.</div>

            <div class="flex-break"></div>
            <button class="btn secondary" id="folderToggle">Show Folders</button>
            <div id="folderPanel">
                <button class="btn secondary" id="toggleAllBtn">Toggle All Folders</button>
                <button class="btn ghost" id="invertBtn">Invert Folders</button>
                <div id="folderFilterList"></div>
            </div>
        </fieldset>
        <fieldset class="controls-row">
            <legend>View</legend>
            <button class="btn primary" id="randomBtn">Random</button>
            <button class="btn secondary" id="currentBtn">Current</button>
            <div id="shuffleToggleContainer">
                <span>Shuffle</span>
                <label class="switch">
                    <input type="checkbox" id="shuffleToggle" checked />
                    <span class="slider"></span>
                </label>
            </div>
        </fieldset>
    </div>

    <div id="notice"></div>
    <div id="gallery" aria-live="polite"></div>

    <div id="overlay" role="dialog" aria-modal="true">
        <div id="slideBox">
            <img id="slideImg" src="" alt="slide image" />
            <div id="overlayCaption"></div>

            <button id="fullscreenBtn" class="btn secondary">Fullscreen</button>
            <button id="closeOverlay" class="btn ghost">Close</button>

            <div id="bottomControls">
                <button id="prevBtn" class="btn secondary" aria-label="Previous slide">⏮ Prev</button>
                <button id="playPauseBtn" class="btn" aria-label="Play or pause slideshow">▶ Play</button>
                <button id="nextBtn" class="btn secondary" aria-label="Next slide">Next ⏭</button>
            </div>
            <div id="durationControl">
                <label for="durationInput">Duration (s):</label>
                <input id="durationInput" type="number" min="0.1" step="0.5" value="2" inputmode="decimal" />
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // DOM refs
        // ============================================================
        const chooseBtn = document.getElementById('chooseBtn');
        const fileInput = document.getElementById('fileInput');
        const clearBtn = document.getElementById('clearBtn');
        const shuffleToggle = document.getElementById('shuffleToggle');
        const randomBtn = document.getElementById('randomBtn');
        const currentBtn = document.getElementById('currentBtn');
        const folderPanel = document.getElementById('folderPanel');
        const folderFilterList = document.getElementById('folderFilterList');
        const folderToggle = document.getElementById('folderToggle');
        const toggleAllBtn = document.getElementById('toggleAllBtn');
        const invertBtn = document.getElementById('invertBtn');
        const info = document.getElementById('info');
        const notice = document.getElementById('notice');
        const gallery = document.getElementById('gallery');
        const overlay = document.getElementById('overlay');
        const slideImg = document.getElementById('slideImg');
        const overlayCaption = document.getElementById('overlayCaption');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const durationInput = document.getElementById('durationInput');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const closeOverlayBtn = document.getElementById('closeOverlay');

        // ============================================================
        // State
        // The DOM is never read to infer state — only written to.
        // All logic operates on this object; render() reflects it.
        // ============================================================
        const state = {
            // Image data
            loadedImages: [],   // [{ name, folder, url }]
            activeImages: [],   // filtered + sorted subset of loadedImages

            // Folder filter: { folderName: boolean }
            // Keys are added when images load; true = included.
            folders: {},
            foldersVisible: false,

            // Viewer
            overlayOpen: false,
            currentIndex: 0,

            // Slideshow
            shuffled: true,
            intervalMs: parseFloat(durationInput.value) * 1000,
            slideshowTimer: null,

            // Misc
            wakeLock: null,
            uiTimeout: null,
            touchStartX: 0,
            touchStartY: 0,
        };

        // Preload cache for smoother transitions (not part of render state)
        const preloadCache = new Map();
        const MAX_PRELOAD_CACHE = 25;

        // ============================================================
        // Pure helpers
        // ============================================================
        function shuffleArray(arr)
        {
            const a = arr.slice();
            for (let i = a.length - 1; i > 0; i--)
            {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function safeId(prefix, str, idx)
        {
            return `${prefix}_${idx}_${encodeURIComponent(str).replace(/%/g, '_')}`;
        }

        function deepestCommonAncestor(paths)
        {
            if (!paths.length) return '';

            // Split each path into its segments: "a/b/c" → ["a", "b", "c"]
            const splitPaths = paths.map(p => p.replaceAll('\\', '/').split('/'));

            let i = 0;

            while (true)
            {
                // Look at the current segment in the first path
                const segment = splitPaths[0][i];

                // If we've run out of segments, stop
                if (segment === undefined) break;

                // If any path differs at this position, stop
                if (!splitPaths.every(sp => sp[i] === segment)) break;

                // Otherwise this segment is common — keep going
                i++;
            }

            // Join all the shared segments back into a path
            return splitPaths[0].slice(0, i).join('/');
        }

        function buildActiveImages()
        {
            const filtered = state.loadedImages.filter(img => state.folders[img.folder] !== false);
            if (state.shuffled)
            {
                return shuffleArray(filtered);
            }
            return filtered.toSorted((a, b) =>
                (a.folder + a.name).localeCompare(b.folder + b.name, undefined, { numeric: true, sensitivity: 'base' })
            );
        }

        // ============================================================
        // Render — the single function that writes state → DOM.
        // Grouped by concern so it's easy to find what drives what.
        // ============================================================
        function render()
        {
            const { loadedImages, folders, foldersVisible, activeImages,
                overlayOpen, currentIndex, shuffled, slideshowTimer } = state;

            // --- Info bar ---
            info.textContent = `${loadedImages.length} image${loadedImages.length !== 1 ? 's' : ''} loaded.`;

            // --- Folder toggle button ---
            const hasFolders = loadedImages.length > 0;
            folderToggle.style.display = hasFolders ? 'flex' : 'none';
            folderToggle.textContent = foldersVisible ? 'Hide Folders' : 'Show Folders';

            // --- Folder panel visibility ---
            folderPanel.style.display = (hasFolders && foldersVisible) ? 'block' : 'none';

            // --- Folder filter checkboxes ---
            // Rebuild list only when folder keys have changed to avoid thrashing.
            const currentFolderKeys = Object.keys(folders).sort();
            const renderedFolderKeys = [...folderFilterList.querySelectorAll('label')].map(l => l.dataset.folder).sort();
            const folderListChanged = currentFolderKeys.join('\0') !== renderedFolderKeys.join('\0');

            if (folderListChanged)
            {
                folderFilterList.innerHTML = '';
                currentFolderKeys.forEach((folder, idx) =>
                {
                    const inputId = safeId('folder', folder, idx);
                    const label = document.createElement('label');
                    label.htmlFor = inputId;
                    label.dataset.folder = folder;

                    const input = document.createElement('input');
                    input.type = 'checkbox';
                    input.id = inputId;
                    input.addEventListener('change', e =>
                    {
                        state.folders[folder] = e.target.checked;
                        state.activeImages = buildActiveImages();
                        render();
                    });

                    label.appendChild(input);
                    const count = loadedImages.filter(img => img.folder === folder).length;
                    label.append(` ${folder} (${count})`);
                    folderFilterList.appendChild(label);
                });
            }

            // Always sync checkbox checked state from state.folders
            folderFilterList.querySelectorAll('label').forEach(label =>
            {
                const input = label.querySelector('input');
                input.checked = folders[label.dataset.folder] !== false;
            });

            // --- Gallery ---
            gallery.innerHTML = '';
            activeImages.forEach((it, i) =>
            {
                const d = document.createElement('div');
                d.className = 'thumb';
                const img = document.createElement('img');
                img.src = it.url;
                img.alt = it.name;
                img.loading = 'lazy';
                d.appendChild(img);
                d.addEventListener('click', () =>
                {
                    state.overlayOpen = true;
                    state.currentIndex = i;
                    render();
                });
                gallery.appendChild(d);
            });

            // --- Shuffle toggle ---
            shuffleToggle.checked = shuffled;

            // --- Overlay open/close ---
            overlay.classList.toggle('open', overlayOpen);

            if (overlayOpen && activeImages.length)
            {
                const it = activeImages[currentIndex];
                slideImg.src = it.url;
                overlayCaption.textContent = `${it.folder} / ${it.name}`;
                preloadNext();
            }
            else if (!overlayOpen)
            {
                slideImg.src = '';
                overlayCaption.textContent = '';
            }

            // --- Play/pause button label ---
            playPauseBtn.textContent = slideshowTimer ? '⏸ Pause' : '▶ Play';

            console.log(state);
            
        }

        // ============================================================
        // Preload
        // ============================================================
        function preloadNext()
        {
            if (!state.activeImages.length) return;
            const nextUrl = state.activeImages[(state.currentIndex + 1) % state.activeImages.length]?.url;
            if (nextUrl && !preloadCache.has(nextUrl))
            {
                if (preloadCache.size >= MAX_PRELOAD_CACHE)
                {
                    preloadCache.delete(preloadCache.keys().next().value);
                }
                const img = new Image();
                img.src = nextUrl;
                preloadCache.set(nextUrl, img);
            }
        }

        // ============================================================
        // Image loading
        // ============================================================
        chooseBtn.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', e => handleFiles(e.target.files));

        function handleFiles(fileList)
        {
            const arr = Array.from(fileList).filter(f => f.type?.startsWith('image/'));
            if (!arr.length) return;

            const paths = arr.map(f => f.webkitRelativePath || f.name);
            const ancestor = deepestCommonAncestor(paths);

            arr.forEach(f =>
            {
                const relPath = (f.webkitRelativePath || f.name).substring(ancestor.length).replace(/^\/+/, '');
                const folder = relPath.includes('/') ? relPath.split('/').slice(0, -1).join('/') : '(root)';
                if (!state.loadedImages.some(l => l.folder === folder && l.name === f.name))
                {
                    state.loadedImages.push({ name: f.name, folder, url: URL.createObjectURL(f) });
                    // New folders default to included; existing folders keep their checked state
                    if (!(folder in state.folders)) state.folders[folder] = true;
                }
            });

            state.activeImages = buildActiveImages();
            fileInput.value = '';
            render();
        }

        clearBtn.addEventListener('click', () =>
        {
            state.loadedImages.forEach(i => { try { URL.revokeObjectURL(i.url); } catch { } });
            preloadCache.clear();
            state.loadedImages = [];
            state.activeImages = [];
            state.folders = {};
            state.foldersVisible = false;
            state.overlayOpen = false;
            state.currentIndex = 0;
            stopSlideshow();
            try { document.exitFullscreen(); } catch { }
            render();
        });

        // ============================================================
        // Folder controls
        // ============================================================
        folderToggle.addEventListener('click', () =>
        {
            state.foldersVisible = !state.foldersVisible;
            render();
        });

        toggleAllBtn.addEventListener('click', () =>
        {
            const anyUnchecked = Object.values(state.folders).some(v => v === false);
            Object.keys(state.folders).forEach(k => state.folders[k] = anyUnchecked);
            state.activeImages = buildActiveImages();
            render();
        });

        invertBtn.addEventListener('click', () =>
        {
            Object.keys(state.folders).forEach(k => state.folders[k] = !state.folders[k]);
            state.activeImages = buildActiveImages();
            render();
        });

        // ============================================================
        // Shuffle
        // ============================================================
        shuffleToggle.addEventListener('change', () =>
        {
            state.shuffled = shuffleToggle.checked;
            state.activeImages = buildActiveImages();
            render();
        });

        // ============================================================
        // Viewer navigation
        // ============================================================
        randomBtn.addEventListener('click', () =>
        {
            if (!state.activeImages.length) { notice.textContent = 'No images loaded'; return; }
            state.currentIndex = Math.floor(Math.random() * state.activeImages.length);
            state.overlayOpen = true;
            render();
        });

        currentBtn.addEventListener('click', () =>
        {
            if (!state.activeImages.length) { notice.textContent = 'No images loaded'; return; }
            state.overlayOpen = true;
            render();
        });

        closeOverlayBtn.addEventListener('click', closeOverlay);

        function closeOverlay()
        {
            state.overlayOpen = false;
            stopSlideshow();
            releaseWakeLock();
            try { document.exitFullscreen(); } catch { }
            render();
        }

        function showAt(i)
        {
            if (!state.activeImages.length) return;
            state.currentIndex = ((i % state.activeImages.length) + state.activeImages.length) % state.activeImages.length;
            render();
        }

        function next() { showAt(state.currentIndex + 1); }
        function prev() { showAt(state.currentIndex - 1); }

        prevBtn.addEventListener('click', () => { stopSlideshow(); prev(); });
        nextBtn.addEventListener('click', () => { stopSlideshow(); next(); });

        // ============================================================
        // Slideshow
        // ============================================================
        function startSlideshow(resume = false)
        {
            if (!state.activeImages.length)
            {
                notice.textContent = 'Please select folders first';
                return;
            }
            state.overlayOpen = true;
            state.intervalMs = Math.max(0.1, parseFloat(durationInput.value)) * 1000;
            stopSlideshow();
            if (!resume) showAt(state.currentIndex);
            state.slideshowTimer = setInterval(() => next(), state.intervalMs);
            requestWakeLock();
            render();
        }

        function stopSlideshow()
        {
            if (state.slideshowTimer)
            {
                clearInterval(state.slideshowTimer);
                state.slideshowTimer = null;
            }
            releaseWakeLock();
            // Note: render() is not called here — callers are responsible,
            // to avoid double renders when stopSlideshow is called mid-action.
        }

        function togglePlayPause()
        {
            if (state.slideshowTimer) { stopSlideshow(); render(); }
            else startSlideshow(true);
        }

        playPauseBtn.addEventListener('click', togglePlayPause);

        durationInput.addEventListener('change', () =>
        {
            state.intervalMs = Math.max(0.1, parseFloat(durationInput.value) || 2) * 1000;
            if (state.slideshowTimer) startSlideshow(true);
        });

        durationInput.addEventListener('focus', () =>
        {
            setTimeout(() => durationInput.scrollIntoView({ behavior: 'smooth', block: 'center' }), 400);
        });

        // ============================================================
        // Fullscreen
        // ============================================================
        fullscreenBtn.addEventListener('click', () =>
        {
            if (!document.fullscreenElement) overlay.requestFullscreen().catch(err => console.warn(err));
            else try { document.exitFullscreen(); } catch { }
        });

        document.addEventListener('fullscreenchange', () =>
        {
            fullscreenBtn.textContent = document.fullscreenElement ? 'Exit Fullscreen' : 'Fullscreen';
        });

        // ============================================================
        // UI auto-hide in overlay
        // ============================================================
        function showOverlayUI()
        {
            overlay.classList.add('show-ui');
            clearTimeout(state.uiTimeout);
            state.uiTimeout = setTimeout(() => overlay.classList.remove('show-ui'), 2000);
        }

        overlay.addEventListener('mousemove', showOverlayUI);
        overlay.addEventListener('touchstart', showOverlayUI, { passive: true });
        document.addEventListener('keydown', showOverlayUI);

        // ============================================================
        // Keyboard controls
        // ============================================================
        document.addEventListener('keydown', e =>
        {
            if (!state.overlayOpen) return;
            if (e.key === 'Escape') closeOverlay();
            if (e.key === 'ArrowRight') { stopSlideshow(); next(); }
            if (e.key === 'ArrowLeft') { stopSlideshow(); prev(); }
            if (e.key === ' ') { e.preventDefault(); togglePlayPause(); }
        });

        // ============================================================
        // Touch controls
        // ============================================================
        overlay.addEventListener('click', e => { if (e.target === overlay) closeOverlay(); });

        overlay.addEventListener('touchstart', e =>
        {
            state.touchStartX = e.changedTouches[0].screenX;
            state.touchStartY = e.changedTouches[0].screenY;
        }, { passive: true });

        overlay.addEventListener('touchend', e =>
        {
            const dx = e.changedTouches[0].screenX - state.touchStartX;
            const dy = e.changedTouches[0].screenY - state.touchStartY;
            if (Math.abs(dy) > Math.abs(dx))
            {
                if (Math.abs(dy) > 150) closeOverlay();
            }
            else if (Math.abs(dx) > 50)
            {
                const wasPlaying = !!state.slideshowTimer;
                stopSlideshow();
                dx > 0 ? prev() : next();
                if (wasPlaying) startSlideshow(true);
            }
        }, { passive: true });

        // ============================================================
        // Wake Lock
        // ============================================================
        async function requestWakeLock()
        {
            if (!('wakeLock' in navigator))
            {
                notice.textContent = 'Wake Lock not supported. Run via localhost/HTTPS for screen to stay on.';
                return;
            }
            try
            {
                state.wakeLock = await navigator.wakeLock.request('screen');
                state.wakeLock.addEventListener('release', () => console.log('WakeLock released'));
                notice.textContent = '';
            }
            catch (err)
            {
                console.warn('WakeLock failed:', err);
                notice.textContent = 'Wake Lock could not be acquired. Run via localhost or HTTPS for full functionality.';
            }
        }

        function releaseWakeLock()
        {
            if (state.wakeLock) { state.wakeLock.release(); state.wakeLock = null; }
            notice.textContent = '';
        }

        // ============================================================
        // Initial render
        // ============================================================
        render();

    </script>
</body>

</html>
